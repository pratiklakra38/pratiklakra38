name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Pac-Man SVG
        run: |
          python3 << 'PYEOF'
          import requests, json, re, math, random

          USERNAME = "pratiklakra38"

          # Fetch contribution data via GitHub API
          query = """
          {
            user(login: "%s") {
              contributionsCollection {
                contributionCalendar {
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                      color
                    }
                  }
                }
              }
            }
          }
          """ % USERNAME

          import os
          token = os.environ.get("GITHUB_TOKEN", "")
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          res = requests.post("https://api.github.com/graphql", json={"query": query}, headers=headers)
          data = res.json()

          weeks = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["weeks"]

          CELL = 12
          GAP = 3
          STEP = CELL + GAP
          COLS = len(weeks)
          ROWS = 7
          PAD = 20

          W = PAD * 2 + COLS * STEP
          H = PAD * 2 + ROWS * STEP + 60

          # Build dot grid
          dots = []
          cells = []
          for ci, week in enumerate(weeks):
              for ri, day in enumerate(week["contributionDays"]):
                  x = PAD + ci * STEP + CELL // 2
                  y = PAD + 40 + ri * STEP + CELL // 2
                  count = day["contributionCount"]
                  color = day["color"] if count > 0 else "#161b22"
                  cells.append((x - CELL//2, y - CELL//2, color, count))
                  if count > 0:
                      dots.append((x, y))

          # Pac-Man path: left to right across rows
          total_dur = 8

          svg = f'''<svg width="{W}" height="{H}" viewBox="0 0 {W} {H}" xmlns="http://www.w3.org/2000/svg">
            <style>
              .cell {{ rx: 2; ry: 2; }}
              text {{ font-family: monospace; }}
            </style>
            <rect width="{W}" height="{H}" fill="#0d1117" rx="8"/>
            <text x="{W//2}" y="24" fill="#39d353" font-size="13" font-family="monospace" text-anchor="middle" font-weight="bold">🕹 PAC-MAN eating contributions</text>
          '''

          # Draw cells
          for (cx, cy, color, count) in cells:
              svg += f'<rect class="cell" x="{cx}" y="{cy}" width="{CELL}" height="{CELL}" fill="{color}"/>\n'

          # Draw dots on contributions
          dot_svg = ""
          eaten_svg = ""
          for (dx, dy) in dots:
              dot_svg += f'<circle cx="{dx}" cy="{dy}" r="2" fill="#FFD700" opacity="1"><animate attributeName="opacity" values="1;0" dur="{total_dur}s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5" keySplines=""/></circle>\n'

          svg += dot_svg

          # Pac-Man animation: sweep left→right row by row
          # Simple: animate along a path
          # Use a single pac-man moving in a snake path
          start_x = PAD + CELL // 2
          start_y = PAD + 40 + CELL // 2

          path_d = f"M {start_x} {start_y}"
          for ri in range(ROWS):
              y = PAD + 40 + ri * STEP + CELL // 2
              if ri % 2 == 0:
                  path_d += f" L {PAD + (COLS-1)*STEP + CELL//2} {y}"
              else:
                  path_d += f" L {start_x} {y}"
              if ri < ROWS - 1:
                  next_y = PAD + 40 + (ri+1) * STEP + CELL // 2
                  path_d += f" L {PAD + (COLS-1)*STEP + CELL//2 if ri%2==0 else start_x} {next_y}"

          # Pac-Man mouth open/close
          pac_size = 9
          svg += f'''
            <g id="pacman">
              <animateMotion dur="{total_dur}s" repeatCount="indefinite" rotate="auto">
                <mpath href="#pacpath"/>
              </animateMotion>
              <!-- body -->
              <circle r="{pac_size}" fill="#FFD700"/>
              <!-- mouth -->
              <path d="M0,0 L{pac_size},{ -pac_size//2} A{pac_size},{pac_size} 0 1,0 {pac_size},{pac_size//2} Z" fill="#0d1117">
                <animate attributeName="d"
                  values="M0,0 L{pac_size},-4 A{pac_size},{pac_size} 0 1,0 {pac_size},4 Z;
                          M0,0 L{pac_size},0 A{pac_size},{pac_size} 0 1,0 {pac_size},0 Z;
                          M0,0 L{pac_size},-4 A{pac_size},{pac_size} 0 1,0 {pac_size},4 Z"
                  dur="0.3s" repeatCount="indefinite"/>
              </path>
              <!-- eye -->
              <circle cx="2" cy="-5" r="1.5" fill="#0d1117"/>
            </g>
            <path id="pacpath" d="{path_d}" fill="none"/>
          '''

          svg += "</svg>"

          os.makedirs("dist", exist_ok=True)
          with open("dist/pacman.svg", "w") as f:
              f.write(svg)
          print("Done! pacman.svg generated.")
          PYEOF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
